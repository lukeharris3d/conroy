<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>AP01</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Make the app take up the full screen */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Prevents scrollbars if the model is slightly larger */
      }

      model-viewer {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
    ></script>

    <model-viewer
      src="https://lukeharris3d.github.io/conroy/AP04.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      tone-mapping="neutral"
      poster="poster.webp"
      shadow-intensity="1"
      camera-orbit="242.5deg 50.98deg 1.697m"
      field-of-view="31.21deg"
    >
      <button
        class="Hotspot"
        slot="hotspot-2"
        data-position="-0.18848228990089277m 0.0451458955664871m -0.2735916222909843m"
        data-normal="-0.13849776281845425m -0.11402857434476671m -0.9837763231178027m"
        data-visibility-attribute="visible"
      >
        <div class="HotspotAnnotation">1</div></button
      ><button
        class="Hotspot"
        slot="hotspot-3"
        data-position="-0.12090387740966219m 0.04092497650444408m -0.27044020361517246m"
        data-normal="0.06106898123997884m 0.11933057221751582m -0.9909746687300092m"
        data-visibility-attribute="visible"
      >
        <div class="HotspotAnnotation">2</div></button
      ><button
        class="Hotspot"
        slot="hotspot-4"
        data-position="-0.07219238744496012m 0.04753389331610591m -0.2591055620081001m"
        data-normal="0.4686036912456784m 0.3844056366262207m -0.7953885132945502m"
        data-visibility-attribute="visible"
      >
        <div class="HotspotAnnotation">3</div></button
      ><button
        class="Hotspot"
        slot="hotspot-5"
        data-position="-0.041984984890336495m 0.04166152854154099m -0.24420940916968673m"
        data-normal="0.48535467300947105m 0.4970609223228629m -0.7192783055865193m"
        data-visibility-attribute="visible"
      >
        <div class="HotspotAnnotation">4</div></button
      ><button
        class="Hotspot"
        slot="hotspot-6"
        data-position="-0.182004168821362m 0.10286896182884278m -0.04937297362980926m"
        data-normal="-0.7935474956586941m 0.5182097198627477m -0.3189687420008234m"
        data-visibility-attribute="visible"
      >
        <div class="HotspotAnnotation">5</div></button
      ><button
        class="Hotspot"
        slot="hotspot-7"
        data-position="-0.17910473221919215m 0.006806282078231196m 0.2690851424136125m"
        data-normal="0.009272751889926639m 0.9976238130704352m 0.0682696394248083m"
        data-visibility-attribute="visible"
      >
        <div class="HotspotAnnotation">6</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">View in your space</button>
      <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png" />
      </div>
    </model-viewer>
  </body>
</html>
