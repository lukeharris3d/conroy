<!DOCTYPE html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>AP01</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Make the app take up the full screen */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Prevents scrollbars if the model is slightly larger */
      }

      model-viewer {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>

    <script src="script.js"></script>
