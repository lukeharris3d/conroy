<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>AP01</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Make the app take up the full screen */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Prevents scrollbars if the model is slightly larger */
      }

      model-viewer {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
    ></script>

    <model-viewer
      src="https://lukeharris3d.github.io/conroy/AP02.glb"
ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" camera-orbit="59.8deg 75deg 1.634m" field-of-view="31.68deg">
    <button class="Hotspot" slot="hotspot-1" data-position="0.13843385443943476m 0.06643677434664083m 0.3104151748058474m" data-normal="0.12473772861998877m -0.41972474302673113m 0.8990392867666412m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">1</div>
    </button><button class="Hotspot" slot="hotspot-2" data-position="0.26096333137448546m 0.06069573463599367m 0.05442141763833114m" data-normal="0.8179211146427425m -0.46188868847926134m 0.34302170438105195m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">2</div>

        <div class="HotspotAnnotation">3</div>
    </button><button class="Hotspot" slot="hotspot-4" data-position="0.27648232862181704m 0.08380055179928679m -0.2595771841463868m" data-normal="0.3123235896198514m -0.07166650170041913m -0.9472686461089034m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">4</div>
    </button><button class="Hotspot" slot="hotspot-5" data-position="0.22794873192166723m 0.02256420150567847m -0.2477225198394733m" data-normal="0.14994315500491726m -0.4934872219283527m -0.8567306531580439m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">5</div>

    <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
    </div>
    <button slot="ar-button" id="ar-button">
        View in your space
    </button>
    <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
    </div>
</model-viewer>

  </body>
</html>
